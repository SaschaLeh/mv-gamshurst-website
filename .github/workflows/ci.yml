name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    env:
      # Skeleton-Mode: ohne STORYBLOK_DELIVERY_TOKEN-Secret schlägt der Loader
      # im Production-Mode (version=published) absichtlich fehl. Draft erlaubt
      # leere Collections und prüft alles Nicht-Storyblok (TS, Astro-Pipeline).
      # Volle Content-Validierung läuft erst im Cloudflare-Workers-Build.
      STORYBLOK_VERSION: draft
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Astro type check
        run: npm run check

      - name: Astro build
        run: npm run build
